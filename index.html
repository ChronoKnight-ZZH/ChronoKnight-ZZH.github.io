<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    line-height: 1.6;
    color: #333;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
}

header {
    background: rgba(255, 255, 255, 0.9);
    padding: 60px 20px;
    text-align: center;
    margin-bottom: 40px;
}

header h1 {
    font-size: 2.5em;
    color: #333;
    margin-bottom: 10px;
}

main {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 20px;
}

section {
    background: white;
    padding: 30px;
    border-radius: 10px;
    margin-bottom: 30px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h2 {
    color: #667eea;
    margin-bottom: 15px;
}

footer {
    text-align: center;
    padding: 20px;
    color: white;
    margin-top: 40px;
}
</style>
<body>
    <header>
        <h1>欢迎来到我的个人网站</h1>
        <p>这是我的第一个GitHub Pages网站</p>
    </header>
    
    <main>
        <section class="about">
            <h2>关于我</h2>
            <p>大家好！我是一名网页开发爱好者。</p>
        </section>
        
        <section class="projects">
            <h2>我的项目</h2>
            <ul>
                <a href="/LayUI Form Builder"><li>项目1：表单生成器</li></a>
                <a href="/HTML Playground"><li>项目2：HTML运行</li></a>
                <a href="/Fruit Match"><li>项目3：消消乐</li></a>
                <a href="/MarkFlow"><li>项目4：Markdown编辑器</li></a>
                <a href="/CubeSim"><li>项目5：魔方模拟器</li></a>
                <a href="/index7"><li>项目6：组合性密码生成器</li></a>
            </ul>
            <ul>
<a href="/生日快乐"><li>生日快乐</li></a>
<a href="/除夕快乐"><li>除夕快乐</li></a>
            </ul>
        </section>
    </main>
    
    <footer>
        <p>© 2024 我的个人网站</p>
    </footer>
    
    <script src="script.js"></script>
</body>
<script>
    // 页面加载完成后执行
document.addEventListener('DOMContentLoaded', function() {
    console.log('欢迎访问我的个人网站！');
    
    // 添加简单的交互效果
    const header = document.querySelector('header');
    header.addEventListener('mouseenter', function() {
        this.style.transform = 'scale(1.02)';
        this.style.transition = 'transform 0.3s ease';
    });
    
    header.addEventListener('mouseleave', function() {
        this.style.transform = 'scale(1)';
    });
    
    // 动态更新版权年份
    const year = new Date().getFullYear();
    document.querySelector('footer p').textContent = `© ${year} 我的个人网站`;
});
</script>

</html>
