<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360° 全景预览</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    #viewer { width: 100%; height: 100%; }

    /* 浮动工具栏 */
    .toolbar {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 10px;
      background: rgba(0,0,0,0.6);
      padding: 10px 20px;
      border-radius: 8px;
      color: white;
      font-family: Arial, sans-serif;
    }
    .toolbar button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      background: #4a90d9;
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    .toolbar button:hover { background: #357abd; }
    .toolbar .drop-hint {
      font-size: 13px;
      line-height: 36px;
      opacity: 0.9;
    }
    #file-input { display: none; }

    /* 拖拽悬停效果 */
    .drop-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.9);
      pointer-events: none;
      font-size: 24px;
      color: #333;
    }
    .drop-overlay.active { display: flex; }
  </style>
</head>
<body>
  <div id="viewer">
    <!-- 浮动工具栏（按钮 + 提示） -->
    <div class="toolbar">
      <button id="btn-load">📁 选择图片</button>
      <span class="drop-hint">或直接拖拽图片到页面</span>
    </div>
    <!-- 拖拽悬停覆盖层 -->
    <div class="drop-overlay" id="drop-overlay">释放鼠标以加载全景图</div>
  </div>

  <input type="file" id="file-input" accept="image/*" />

  <!-- 依赖 -->
  <script src="https://cdn.jsdelivr.net/npm/three/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.min.js"></script>

  <script>
    // 创建查看器实例（初始使用服务器静态图片）
    const viewer = new PhotoSphereViewer.Viewer({
      container: document.querySelector('#viewer'),
      panorama: 'https://photo-sphere-viewer-data.netlify.app/assets/sphere.jpg',
      navbar: ['autorotate', 'zoom', 'fullscreen'],
      defaultZoomLvl: 0,
      mousewheel: true,
    });

    // 元素引用
    const btnLoad = document.getElementById('btn-load');
    const fileInput = document.getElementById('file-input');
    const dropOverlay = document.getElementById('drop-overlay');
    const viewerContainer = document.getElementById('viewer');

    // ---------- 按钮选择图片 ----------
    btnLoad.addEventListener('click', () => {
      fileInput.click(); // 触发文件选择框
    });

    fileInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (file) loadPanoramaFromFile(file);
      // 清空 input，以便选择同一文件再次触发 change
      fileInput.value = '';
    });

    // ---------- 拖拽加载图片 ----------
    // 阻止浏览器默认行为（如打开文件）
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      viewerContainer.addEventListener(eventName, (e) => {
        e.preventDefault();
        e.stopPropagation();
      });
    });

    // 拖入时显示悬停提示
    viewerContainer.addEventListener('dragenter', () => {
      dropOverlay.classList.add('active');
    });
    viewerContainer.addEventListener('dragover', () => {
      dropOverlay.classList.add('active');
    });
    viewerContainer.addEventListener('dragleave', (e) => {
      // 仅当真正离开容器时移除
      if (!viewerContainer.contains(e.relatedTarget)) {
        dropOverlay.classList.remove('active');
      }
    });

    // 释放文件时加载
    viewerContainer.addEventListener('drop', (e) => {
      dropOverlay.classList.remove('active');
      const file = e.dataTransfer.files[0];
      if (file) loadPanoramaFromFile(file);
    });

    // ---------- 通用加载逻辑 ----------
    async function loadPanoramaFromFile(file) {
      // 简单校验是否为图片
      if (!file.type.startsWith('image/')) {
        alert('请选择一张图片文件（JPG、PNG 等）');
        return;
      }

      try {
        // 创建临时 URL（比起直接传 File 对象兼容性更好）
        const objectURL = URL.createObjectURL(file);
        await viewer.setPanorama(objectURL);
        console.log('全景图已更换:', file.name);
        // 加载完成后可释放内存（PSV 内部已持有图片纹理，释放 URL 不影响显示）
        URL.revokeObjectURL(objectURL);
      } catch (err) {
        console.error('全景图加载失败:', err);
        alert('加载失败，请确保图片为等距柱状投影（2:1 比例）的全景图');
      }
    }
  </script>
</body>
</html>
